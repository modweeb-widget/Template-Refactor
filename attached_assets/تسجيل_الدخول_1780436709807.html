<script src="https://cdn.tailwindcss.com"></script>
<style>
  .max-w-md {
    max-width: 340px !important;
    transform: translateY(-50px); /* قيمة سالبة = للأعلى */
  }

.login-fullpage h1, .login-fullpage h2, .login-fullpage h3,
.login-fullpage p, .login-fullpage div, .login-fullpage span {
  margin: 0; /* إزالة هوامش بلوجر الافتراضية */
  padding: 0;
}

body, html { overflow: hidden !important; margin: 0; padding: 0; }
.logo-icon { width: 40px; height: 40px; border-radius: 50%; }

/* === حاوية الصفحة الكاملة === */
.login-fullpage{position:fixed;inset:0;background:var(--bodyB);z-index:9999;display:flex;align-items:center;justify-content:center;min-height:100vh;height:100vh;overflow:hidden;}
/* للتحكم بارتفاع البطاقة للأعلى أو الأسفل: عدّل margin-top أو margin-bottom في .login-container */
.login-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;}
.max-w-md{max-width:330px!important;}

/* === البطاقة الرئيسية === */
.card{background:var(--contentB);border-radius:20px;box-shadow:0 1px 3px 0 rgba(0,0,0,.1),0 1px 2px 0 rgba(0,0,0,.06);border:1px solid var(--contentL);padding:0;margin:0 auto;}
@media (max-width:300px){.card{max-width:95vw;}}

/* === الأزرار === */
.button{display:inline-flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-weight:500;transition:all .2s;cursor:pointer;text-decoration:none;border:none;padding:8px 16px;}
.button-outline{background:0 0;border:1px solid var(--contentL);color:var(--bodyC);}
.button-outline:hover{background:var(--bodyB);}
.button-black{background:var(--linkB);color:var(--white);}
.button-black:hover{background:#262626;}

/* === الروابط === */
.link{color:var(--linkC);text-decoration:underline;text-underline-offset:4px;}
.link:hover{color:var(--headC);}

.card .p-4 { padding: 0.5rem; }
.card .pt-2 { padding-top: 0.5rem; }
.card .pb-0 { padding-bottom: 0; }
.text-neutral-900 { color: var(--headC); }
.text-neutral-500 { color: var(--bodyC); }
.text-neutral-700 { color: var(--headC); }
.px-6 { font-size:10px; }
</style>

<div class="login-fullpage">
  <div class="login-container w-full">
    <div class="mx-auto w-full max-w-md space-y-5 text-center">
      <!-- شعار الموقع -->
      <div class="flex items-center justify-center gap-3 text-sm font-semibold -mt-4 mb-2" style="color:var(--headC);">
        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjlFuMZRXWUpxZK7ZWolRDFXmZuTNvT2uMzetcU_d2gXpLqZ_3B1-vl18e31nhKyo0C_6SOVsxszrL_FxtJ4YCma9QwhNB0BLiTcBNdqYTAuXStazw9Tds6ylCz0IpSEGZ2MnjCSXIfMtYxcnOV8H3sKC5szT2c3FCYDG_DvVIFtTvsgrzRWGO4kFURiO4=s1600" class="size-8 rounded-sm object-cover" width="32" height="32" alt="Modweeb Design">
        <span class="text-lg font-medium">Modweeb Design</span>
      </div>
      <!-- بطاقة تسجيل الدخول -->
      <div class="card mx-auto">
        <div class="space-y-0.2 text-center p-4 pb-0">
          <b class="text-lg font-bold mb-1" style="color:var(--headC);">مرحباً بعودتك</b>
          <p class="text-xs" style="color:var(--bodyC);">تسجيل الدخول باستخدام حسابك الاجتماعي</p>
        </div>
        <div class="p-4 pt-2">
          <div class="grid gap-4">
            <button id="custom-google-btn" class="button button-outline w-full" style="border-radius:15px;">
              <svg class="w-4 h-4 ml-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              تسجيل الدخول باستخدام Google
            </button>
          </div>
        </div>
      </div>
      <!-- الفوتر: الشروط وسياسة الخصوصية -->
      <p class="px-6 text-center text-xs mt-2" style="color:var(--bodyC);font-size:12px;">
        بالنقر على متابعة، فإنك توافق على
        <a href="/p/terms.html" class="link">شروط الخدمة</a>
        و<br>
        <a href="/p/privacy-policy.html" class="link">سياسة الخصوصية</a>.
      </p>
    </div>
  </div>
</div>
<div id="toastMessage" class="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer onload="initGSI()"></script>
<script>
/* === دوال المصادقة والإشعارات === */

let client;
function initGSI(){"undefined"!=typeof google&&void 0!==google.accounts?(client=google.accounts.oauth2.initTokenClient({client_id:"36053852280-iqmfrcu1m2vd8ai6sc4e10r6afaiiln0.apps.googleusercontent.com",scope:"openid profile email",callback:e=>{e&&e.access_token?getUserInfo(e.access_token):notify("لم يتم العثور على رمز الوصول. يرجى المحاولة مرة أخرى.")}}),document.getElementById("custom-google-btn").addEventListener("click",()=>{client.requestAccessToken()})):notify("فشل تحميل مكتبة جوجل للمصادقة. يرجى التحقق من اتصالك بالإنترنت.")}
</script>
