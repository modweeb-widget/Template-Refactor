kind = "web"
previewPath = "/"
title = "Modweeb Template"
version = "1.0.0"
id = "artifacts/modweeb-template"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20840

[services.development]
run = "pnpm --filter @workspace/modweeb-template run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modweeb-template", "run", "build" ]
publicDir = "artifacts/modweeb-template/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20840"
BASE_PATH = "/"
